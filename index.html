<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PrismOps — مخزن الأدوات</title>
<script>
  (function() {
    try {
      var saved = localStorage.getItem('prismops_theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
  })();
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --bg:       #F2F4F7;
    --surface:  #FAFBFC;
    --card:     #FFFFFF;
    --card-2:   #F3F5F8;
    --border:   #E0E4EA;
    --hover-border: #C4CBD4;
    --steel:    #1F7A99;
    --steel-rgb: 31,122,153;
    --amber:    #D9730D;
    --amber-2:  #B85D0A;
    --amber-rgb: 217,115,13;
    --success:  #1F9D55;
    --success-rgb: 31,157,85;
    --danger:   #D9433F;
    --danger-rgb: 217,67,63;
    --warn:     #B4790E;
    --warn-rgb: 180,121,14;
    --text:     #1C2430;
    --muted:    #66707C;
    --radius:   12px;
    --shadow-sm: 0 2px 10px rgba(31,41,55,.08);
    --shadow-md: 0 14px 32px rgba(31,41,55,.14);
    --header-end: #EDF0F4;
    --success-2: #157A42;
    --steel-2:   #16607A;
    color-scheme: light;
  }

  [data-theme="dark"] {
    --bg:       #0D1117;
    --surface:  #141A22;
    --card:     #1B222C;
    --card-2:   #212934;
    --border:   #2A3341;
    --hover-border: #384254;
    --steel:    #45B8C9;
    --steel-rgb: 69,184,201;
    --amber:    #F2994A;
    --amber-2:  #D97B2E;
    --amber-rgb: 242,153,74;
    --success:  #4ADE80;
    --success-rgb: 74,222,128;
    --danger:   #F2706F;
    --danger-rgb: 242,112,111;
    --warn:     #FBBF24;
    --warn-rgb: 251,191,36;
    --text:     #E8ECF2;
    --muted:    #8A97A8;
    --shadow-sm: 0 2px 10px rgba(0,0,0,.28);
    --shadow-md: 0 10px 28px rgba(0,0,0,.4);
    --header-end: #0D1117;
    --success-2: #2F8A5A;
    --steel-2:   #3F7EA3;
    color-scheme: dark;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; transition: background-color .3s ease; }
  body {
    transition: background-color .3s ease;
    background:
      radial-gradient(circle at 15% 0%, rgba(var(--amber-rgb),.05), transparent 40%),
      radial-gradient(circle at 85% 10%, rgba(var(--steel-rgb),.05), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'Cairo', system-ui, sans-serif;
    font-size: 15px;
    min-height: 100vh;
    padding-bottom: 50px;
    -webkit-font-smoothing: antialiased;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseDot {
    0%   { box-shadow: 0 0 0 0 rgba(var(--success-rgb),.55); }
    70%  { box-shadow: 0 0 0 7px rgba(var(--success-rgb),0); }
    100% { box-shadow: 0 0 0 0 rgba(var(--success-rgb),0); }
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, var(--surface), var(--header-end));
    border-bottom: 2px solid var(--amber);
    box-shadow: var(--shadow-sm);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--amber), var(--amber-2));
    box-shadow: 0 3px 12px rgba(var(--amber-rgb),.35);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px; color: #fff; flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 900; letter-spacing: .01em; }
  header p  { font-size: 11px; color: var(--muted); }
  .header-status {
    margin-inline-start: auto;
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    animation: pulseDot 2s infinite;
  }
  .header-status span.label { font-size: 11px; color: var(--muted); font-weight: 600; }
  .theme-toggle-btn {
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 100px; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; line-height: 1; cursor: pointer;
    margin-inline-start: 8px; transition: border-color .2s, transform .15s;
  }
  .theme-toggle-btn:hover { border-color: var(--amber); }
  .theme-toggle-btn:active { transform: scale(.9); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1; min-width: 80px;
    background: none; border: none;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 13px 6px; cursor: pointer; transition: color .2s, border-color .2s;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }
  .tab-btn:hover { color: var(--text); }

  /* PANELS */
  .panel { display: none; padding: 18px 15px; }
  .panel.active { display: block; animation: fadeInUp .25s ease; }

  /* CARDS */
  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px; margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }
  .section-title {
    font-size: 12px; font-weight: 700;
    color: var(--amber); text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; display: inline-block;
    width: 4px; height: 14px;
    background: var(--amber); border-radius: 2px;
  }

  /* FIELDS */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  input, select, textarea {
    width: 100%;
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 15px;
    padding: 11px 13px; outline: none; transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(var(--amber-rgb),.12);
  }
  select option { background: var(--card); }

  /* RADIO */
  .radio-group {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 7px;
  }
  .radio-group label {
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 6px; text-align: center;
    cursor: pointer; font-size: 13px; color: var(--text);
    transition: .15s; margin: 0; user-select: none;
  }
  .radio-group input[type=radio] { display: none; }
  .radio-group input[type=radio]:checked + label {
    background: rgba(var(--amber-rgb),.15);
    border-color: var(--amber); color: var(--amber); font-weight: 700;
  }

  /* BUTTONS */
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--amber), var(--amber-2));
    border: none;
    border-radius: var(--radius); color: #fff;
    font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
    padding: 14px; cursor: pointer; margin-top: 6px;
    box-shadow: 0 6px 16px rgba(var(--amber-rgb),.25);
    transition: box-shadow .2s, transform .12s, filter .2s;
  }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:hover  { filter: brightness(1.05); box-shadow: 0 8px 20px rgba(var(--amber-rgb),.35); transform: translateY(-1px); }
  .btn-primary.btn-success-grad { background: linear-gradient(135deg, var(--success), var(--success-2)); box-shadow: 0 6px 16px rgba(var(--success-rgb),.25); }
  .btn-primary.btn-steel-grad   { background: linear-gradient(135deg, var(--steel), var(--steel-2));     box-shadow: 0 6px 16px rgba(var(--steel-rgb),.25); }

  .btn-secondary {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600;
    padding: 9px 16px; cursor: pointer; transition: border-color .2s, background .2s;
  }
  .btn-secondary:hover { border-color: var(--amber); background: var(--card-2); }

  .btn-sm {
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    font-family: 'Cairo', sans-serif; font-size: 12px;
    padding: 4px 10px; cursor: pointer; transition: .15s;
  }
  .btn-sm.danger { border-color: var(--danger); color: var(--danger); }
  .btn-sm.success { border-color: var(--success); color: var(--success); }
  .btn-sm.warn { border-color: var(--warn); color: var(--warn); }
  .btn-sm.danger:hover { background: rgba(var(--danger-rgb),.12); }
  .btn-sm.success:hover { background: rgba(var(--success-rgb),.12); }
  .btn-sm.warn:hover { background: rgba(var(--warn-rgb),.12); }

  /* STATS */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; margin-bottom: 18px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 8px; text-align: center;
    transition: transform .2s, box-shadow .2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
  .stat-num { font-size: 22px; font-weight: 900; color: var(--amber); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 3px; }

  /* TOOL CARD */
  .tool-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 15px; margin-bottom: 10px;
    transition: border-color .2s, transform .2s, box-shadow .2s;
    animation: fadeInUp .3s ease both;
  }
  .tool-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); border-color: var(--hover-border); }
  .tool-card.low-stock { border-color: rgba(var(--danger-rgb),.5); }
  .tool-card.out-stock { border-color: var(--danger); background: rgba(var(--danger-rgb),.05); }

  .tool-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 8px;
  }
  .tool-name { font-size: 15px; font-weight: 700; }
  .tool-id   { font-size: 11px; color: var(--muted); }

  .badge {
    font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 100px; white-space: nowrap;
    letter-spacing: .02em;
  }
  .badge-ok      { background: rgba(var(--success-rgb),.15); color: var(--success); }
  .badge-low     { background: rgba(var(--warn-rgb),.15); color: var(--warn); }
  .badge-out     { background: rgba(var(--danger-rgb),.15);  color: var(--danger); }
  .badge-lent    { background: rgba(var(--steel-rgb),.15); color: var(--steel); }

  .tool-meta {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
  }
  .meta-chip {
    background: var(--card-2); border-radius: 6px;
    font-size: 12px; color: var(--muted); padding: 3px 9px;
  }
  .meta-chip span { color: var(--text); font-weight: 600; }

  .qty-bar-wrap {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 4px;
    height: 6px; margin-bottom: 10px; overflow: hidden;
  }
  .qty-bar {
    height: 100%; border-radius: 4px; transition: width .4s;
  }

  .tool-actions { display: flex; gap: 7px; flex-wrap: wrap; }

  /* INVENTORY VIEW MODES */
  .view-toggle { display: flex; gap: 7px; margin-bottom: 14px; }
  .view-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; color: var(--muted);
    font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 600;
    padding: 7px 16px; cursor: pointer; transition: .15s; flex: 1;
  }
  .view-btn.active { background: rgba(var(--amber-rgb),.15); border-color: var(--amber); color: var(--amber); }
  .view-btn:hover:not(.active) { border-color: var(--hover-border); }

  #inventory-list.view-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  @media (min-width: 640px)  { #inventory-list.view-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 960px)  { #inventory-list.view-grid { grid-template-columns: repeat(4, 1fr); } }
  #inventory-list.view-grid .empty-state { grid-column: 1 / -1; }

  #inventory-list.view-grid .tool-card { padding: 12px; margin-bottom: 0; }
  #inventory-list.view-grid .tool-header { flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  #inventory-list.view-grid .tool-name { font-size: 14px; line-height: 1.3; }
  #inventory-list.view-grid .tool-id { font-size: 10px; }
  #inventory-list.view-grid .tool-meta { gap: 4px; margin-bottom: 8px; }
  #inventory-list.view-grid .meta-chip { font-size: 11px; padding: 3px 7px; }
  #inventory-list.view-grid .tool-actions { gap: 5px; }
  #inventory-list.view-grid .tool-actions .btn-sm { flex: 1; text-align: center; padding: 5px 4px; font-size: 11px; }
  #inventory-list.view-grid .qty-bar-wrap { margin-bottom: 8px; }

  #inventory-list.view-list .tool-card { margin-bottom: 10px; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input { padding-right: 38px; }
  .search-icon {
    position: absolute; left: auto; right: 12px; top: 50%;
    transform: translateY(-50%); color: var(--muted); font-size: 16px;
    pointer-events: none;
  }

  /* SEARCHABLE COMBOBOX (lend / return) */
  .combo-wrap { position: relative; }
  .combo-dropdown {
    display: none;
    position: absolute; top: calc(100% + 6px); right: 0; left: 0;
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 10px; max-height: 230px; overflow-y: auto;
    z-index: 60; box-shadow: var(--shadow-md);
  }
  .combo-dropdown.open { display: block; animation: fadeInUp .15s ease; }
  .combo-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 13px; cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .combo-item:last-child { border-bottom: none; }
  .combo-item:hover, .combo-item:active { background: rgba(var(--amber-rgb),.12); }
  .combo-item-name { font-size: 14px; font-weight: 600; }
  .combo-item-meta { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .combo-empty { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }

  .combo-hint {
    margin-top: 8px; padding: 9px 12px; border-radius: 8px;
    font-size: 12px; line-height: 1.6;
  }
  .combo-hint-tool {
    background: rgba(var(--steel-rgb),.1); border: 1px solid rgba(var(--steel-rgb),.3); color: var(--steel);
  }
  .combo-hint-good {
    background: rgba(var(--warn-rgb),.1); border: 1px solid rgba(var(--warn-rgb),.3); color: var(--warn);
  }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.75); backdrop-filter: blur(3px);
    z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    box-shadow: var(--shadow-md);
    padding: 22px 18px 36px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    animation: fadeInUp .25s ease;
  }
  .modal-title {
    font-size: 16px; font-weight: 800;
    color: var(--amber); margin-bottom: 16px;
  }

  /* HISTORY */
  .log-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    animation: fadeInUp .3s ease both;
  }
  .log-item:last-child { border-bottom: none; }
  .log-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
  }
  .log-text { font-size: 13px; line-height: 1.6; flex: 1; }
  .log-time { font-size: 11px; color: var(--muted); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success); color: #fff;
    font-family: 'Cairo', sans-serif; font-weight: 700;
    font-size: 14px; padding: 11px 22px;
    border-radius: 100px;
    box-shadow: var(--shadow-md);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    z-index: 999; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .empty-state {
    text-align: center; padding: 44px 20px; color: var(--muted);
    animation: fadeInUp .3s ease;
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
  }
  .toolbar-title { font-weight: 700; font-size: 14px; flex: 1; }

  .filter-row {
    display: flex; gap: 7px; margin-bottom: 14px; overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; color: var(--muted);
    font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 600;
    padding: 6px 14px; cursor: pointer; white-space: nowrap; transition: .15s;
  }
  .filter-btn.active { background: rgba(var(--amber-rgb),.15); border-color: var(--amber); color: var(--amber); }
  .filter-btn:hover:not(.active) { border-color: var(--hover-border); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* low stock alert banner */
  .alert-banner {
    background: rgba(var(--danger-rgb),.1); border: 1px solid rgba(var(--danger-rgb),.4);
    border-radius: var(--radius); padding: 12px 15px; margin-bottom: 14px;
    font-size: 13px; color: var(--danger); display: none;
  }
  .alert-banner.show { display: block; animation: fadeInUp .3s ease; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">🔧</div>
  <div>
    <h1>PrismOps — المخزن</h1>
    <p>إدارة أدوات المصنع</p>
  </div>
  <div class="header-status">
    <span class="live-dot"></span>
    <span class="label">مباشر</span>
    <button class="theme-toggle-btn" id="theme-toggle-btn" onclick="toggleTheme()" aria-label="تبديل المظهر" title="تبديل المظهر">🌙</button>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('inventory')">📦 المخزن</button>
  <button class="tab-btn" onclick="switchTab('add')">➕ إضافة</button>
  <button class="tab-btn" onclick="switchTab('lend')">🔄 استعارة</button>
  <button class="tab-btn" onclick="switchTab('log')">📋 السجل</button>
  <button class="tab-btn" onclick="switchTab('export')">📤 تصدير</button>
</div>

<!-- ══════════════════════════════════
     TAB 1 — INVENTORY
══════════════════════════════════ -->
<div class="panel active" id="panel-inventory">
  <div class="stats-row" id="inv-stats"></div>
  <div class="alert-banner" id="low-alert">⚠️ في أدوات وصلت للحد الأدنى — اتحقق منها</div>

  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="ابحث عن أداة..." oninput="renderInventory()">
    <span class="search-icon">🔍</span>
  </div>

  <div class="field">
    <label>الفئة</label>
    <select id="category-filter" onchange="renderInventory()">
      <option value="all">كل الفئات</option>
      <option value="مفاتيح">🔑 مفاتيح + عده خفيفه</option>
      <option value="قياس">شنيور و مثقاب</option>
      <option value="لحام">🔥 مكينة لحام</option>
      <option value="قطع">⚙️ صواريخ</option>
      <option value="كهرباء">⚡ كبلات كهرباء</option>
      <option value="حماية">مستلزمات تشغيل</option>
      <option value="تاني">📦 اخر</option>
    </select>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">الكل</button>
    <button class="filter-btn" onclick="setFilter('متاح', this)">✅ متاح</button>
    <button class="filter-btn" onclick="setFilter('قليل', this)">⚠️ قليل</button>
    <button class="filter-btn" onclick="setFilter('نفد', this)">❌ نفد</button>

<div id="toast">تم ✓</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
// ── Firebase Config ─────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCkj-hGssEeI9-oVBoKjRdTGeUThUEcI",
  authDomain: "prism-factory.firebaseapp.com",
  projectId: "prism-factory",
  storageBucket: "prism-factory.firebasestorage.app",
  messagingSenderId: "236073341904",
  appId: "1:236073341904:web:3abf50039f21ae08e3dfd5",
  measurementId: "G-WF3S1TPQEG"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// مصفوفات محلية مؤقتة عشان الـ Render يشتغل بسرعة
let localToolsArray = [];
let localLogArray = [];
let currentFilter = 'all';
let currentLogFilter = 'all';
let currentView = 'grid';
let comboToolsCache = { lend: [], return: [] };

// ── Realtime Synchronization (الربط اللحظي) ──
// 1. مراقبة الأدوات
db.collection("prismops_tools").onSnapshot((snapshot) => {
  localToolsArray = [];
  snapshot.forEach((doc) => {
    localToolsArray.push({ docId: doc.id, ...doc.data() });
  });
  renderInventory();
  populateLendSelects();
});

// 2. مراقبة السجل
db.collection("prismops_tool_log").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
  localLogArray = [];
  snapshot.forEach((doc) => {
    localLogArray.push(doc.data());
  });
  renderLog();
});

// ── Storage Alternatives ─────────────────────
function getTools() { return localToolsArray; }
function getLog()   { return localLogArray; }
function genId() { return 'T-' + Date.now().toString(36).toUpperCase(); }

// ── Theme (light / dark) ─────────────────────
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem('prismops_theme', theme); } catch(e) {}
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  setTheme(current === 'dark' ? 'light' : 'dark');
}
// sync the button icon with whatever theme the early inline script already applied
setTheme(document.documentElement.getAttribute('data-theme') || 'light');

// ── Tabs ─────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const idx = ['inventory','add','lend','log','export'].indexOf(name);
  if (idx !== -1) document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (name === 'inventory') renderInventory();
  if (name === 'lend')      populateLendSelects();
  if (name === 'log')       renderLog();
}

// ── Filter (inventory) ───────────────────────
function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('#panel-inventory .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInventory();
}

// ── View mode (grid / list) ──────────────────
function setView(mode) {
  currentView = mode;
  const list = document.getElementById('inventory-list');
  if (list) {
    list.classList.toggle('view-grid', mode === 'grid');
    list.classList.toggle('view-list', mode === 'list');
  }
  const gridBtn = document.getElementById('view-grid-btn');
  const listBtn = document.getElementById('view-list-btn');
  if (gridBtn) gridBtn.classList.toggle('active', mode === 'grid');
  if (listBtn) listBtn.classList.toggle('active', mode === 'list');
}

// ── Filter (log) ─────────────────────────────
function setLogFilter(val, btn) {
  currentLogFilter = val;
  document.querySelectorAll('#log-filter-row .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLog();
}

// ── Status helpers ───────────────────────────
function getStatus(t) {
  const type = t.item_type || 'tool'; // توافق مع الأصناف القديمة اللي مفيهاش النوع
  if (type === 'tool' && (t.lent_qty || 0) > 0) return 'معار';
  if (t.qty_current <= 0)         return 'نفد';
  if (t.qty_current <= t.qty_min) return 'قليل';
  return 'متاح';
}
function statusBadge(s) {
  const map = { 'متاح':'badge-ok','قليل':'badge-low','نفد':'badge-out','معار':'badge-lent' };
  return `<span class="badge ${map[s]||'badge-ok'}">${s}</span>`;
}
function barColor(s) {
  return s==='نفد'?'var(--danger)':s==='قليل'?'var(--warn)':s==='معار'?'var(--steel)':'var(--success)';
}

// ── Render Inventory ─────────────────────────
function renderInventory() {
  let tools = getTools();
  const searchInput = document.getElementById('search-input');
  const q = searchInput ? searchInput.value.trim().toLowerCase() : '';

  const categoryFilterEl = document.getElementById('category-filter');
  const categoryFilter = categoryFilterEl ? categoryFilterEl.value : 'all';

  if (q) tools = tools.filter(t => t.name.toLowerCase().includes(q) || (t.category||'').toLowerCase().includes(q));
  if (currentFilter !== 'all') tools = tools.filter(t => getStatus(t) === currentFilter);
  if (categoryFilter && categoryFilter !== 'all') tools = tools.filter(t => t.category === categoryFilter);

  const all = getTools();
  const total  = all.length;
  const avail  = all.filter(t => getStatus(t) === 'متاح').length;
  const low    = all.filter(t => t.qty_current > 0 && t.qty_current <= t.qty_min).length;
  const out    = all.filter(t => t.qty_current <= 0).length;
  const lent   = all.filter(t => getStatus(t) === 'معار').length;

  const invStats = document.getElementById('inv-stats');
  if (invStats) {
    invStats.innerHTML = `
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">إجمالي</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--success)">${avail}</div><div class="stat-label">متاح</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${low}</div><div class="stat-label">قليل</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--steel)">${lent}</div><div class="stat-label">معار</div></div>
    `;
  }

  const alertBanner = document.getElementById('low-alert');
  if (alertBanner) {
    alertBanner.classList.toggle('show', low > 0 || out > 0);
  }

  const list = document.getElementById('inventory-list');
  if (!list) return;

  if (!tools.length) {
    const hasActiveFilters = q || currentFilter !== 'all' || (categoryFilter && categoryFilter !== 'all');
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><p>${hasActiveFilters?'مفيش نتايج':'المخزن فاضي — ابدأ بإضافة أدوات'}</p></div>`;
    return;
  }

  list.innerHTML = tools.map(t => {
    const st  = getStatus(t);
    const type = t.item_type || 'tool';
    const isOutOfStock = t.qty_current <= 0;
    const isLowStock   = !isOutOfStock && t.qty_current <= t.qty_min;
    const max = Math.max(t.qty_current + (t.lent_qty||0), t.qty_min || 1, 1);
    const pct = Math.round((t.qty_current / max) * 100);
    return `
      <div class="tool-card ${isLowStock?'low-stock':isOutOfStock?'out-stock':''}">
        <div class="tool-header">
          <div>
            <div class="tool-id">${t.id} · ${t.category||'عام'} · ${type==='good' ? '📦 بضاعة' : '🔧 أداة'}</div>
            <div class="tool-name">${t.name}</div>
          </div>
          ${statusBadge(st)}
        </div>
        <div class="tool-meta">
          <div class="meta-chip">📦 <span>${t.qty_current} ${t.unit||'قطعة'}</span></div>
          ${t.qty_min ? `<div class="meta-chip">⚠️ حد أدنى <span>${t.qty_min}</span></div>` : ''}
          ${t.lent_qty ? `<div class="meta-chip">🔄 معار <span>${t.lent_qty}</span></div>` : ''}
          ${t.location ? `<div class="meta-chip">📍 <span>${t.location}</span></div>` : ''}
        </div>
        <div class="qty-bar-wrap">
          <div class="qty-bar" style="width:${pct}%;background:${barColor(st)}"></div>
        </div>
        <div class="tool-actions">
          <button class="btn-sm success" onclick="quickAdd('${t.docId}')">+ إضافة</button>
          <button class="btn-sm warn"    onclick="openEditModal('${t.docId}')">✏️ تعديل</button>
          <button class="btn-sm danger"  onclick="deleteTool('${t.docId}')">🗑️ حذف</button>
        </div>
        ${t.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:8px">📝 ${t.notes}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ── Add Tool ─────────────────────────────────
function addTool() {
  const v = id => document.getElementById(id).value.trim();
  const radio = name => { const el = document.querySelector(`[name=${name}]:checked`); return el ? el.value : ''; };

  if (!v('tool_name'))    return alert('اكتب اسم الأداة');
  if (!radio('item_type')) return alert('اختار نوع الصنف');
  if (!radio('category')) return alert('اختار الفئة');
  if (!radio('unit'))     return alert('اختار الوحدة');
  if (v('qty_current') === '') return alert('اكتب الكمية');

  const generatedId = genId();
  const tool = {
    id:          generatedId,
    name:         v('tool_name'),
    item_type:    radio('item_type'), // 'tool' لازم ترجع المخزن، 'good' بيتصرف من غير رجوع
    category:     radio('category'),
    unit:         radio('unit'),
    qty_current:  parseInt(v('qty_current')) || 0,
    qty_min:      parseInt(v('qty_min'))     || 0,
    lent_qty:     0,
    location:     v('location'),
    notes:        v('tool_notes'),
    added_at:     new Date().toISOString()
  };

  db.collection("prismops_tools").add(tool).then(() => {
    addLog('إضافة', generatedId, tool.name, tool.qty_current, null, null, null);
    showToast('تمت الإضافة للسحاب ✓');
  });

  // reset UI
  document.querySelectorAll('[name=category],[name=unit]').forEach(r => r.checked = false);
  document.getElementById('it1').checked = true; // رجّع الافتراضي لـ "أداة"
  ['tool_name','qty_current','qty_min','location','tool_notes'].forEach(id => document.getElementById(id).value = '');
}

// ── Quick add qty ────────────────────────────
function quickAdd(docId) {
  const q = prompt('كام تضيف من الكمية؟', '1');
  const n = parseInt(q);
  if (!n || n <= 0) return;

  const t = localToolsArray.find(x => x.docId === docId);
  if (!t) return;

  db.collection("prismops_tools").doc(docId).update({
    qty_current: t.qty_current + n
  }).then(() => {
    addLog('إضافة كمية', t.id, t.name, n, null, null, null);
    showToast(`تمت إضافة ${n} ${t.unit} ✓`);
  });
}

// ── Lend / Return: searchable combobox ───────
function populateLendSelects() {
  const tools = getTools();
  comboToolsCache.lend   = tools.filter(t => t.qty_current > 0);
  comboToolsCache.return = tools.filter(t => (t.item_type || 'tool') === 'tool' && (t.lent_qty||0) > 0);
  renderComboDropdown('lend', comboToolsCache.lend);
  renderComboDropdown('return', comboToolsCache.return);
}

function filterCombo(type) {
  const input = document.getElementById(type + '_tool_search');
  if (!input) return;
  const q = input.value.trim().toLowerCase();
  const source = comboToolsCache[type] || [];
  const filtered = q
    ? source.filter(t => t.name.toLowerCase().includes(q) || (t.category||'').toLowerCase().includes(q))
    : source;
  renderComboDropdown(type, filtered);
  openCombo(type);
}

function renderComboDropdown(type, list) {
  const dd = document.getElementById(type + '_tool_dropdown');
  if (!dd) return;
  if (!list.length) {
    dd.innerHTML = `<div class="combo-empty">مفيش أدوات مطابقة</div>`;
    return;
  }
  dd.innerHTML = list.map(t => {
    const isGood = (t.item_type || 'tool') === 'good';
    const meta = type === 'lend'
      ? `متاح: ${t.qty_current} ${t.unit||''} · ${isGood ? '📦 بضاعة' : '🔧 أداة'}`
      : `معار: ${t.lent_qty} ${t.unit||''}`;
    return `
    <div class="combo-item" onclick="selectComboItem('${type}','${t.docId}')">
      <span class="combo-item-name">${t.name}</span>
      <span class="combo-item-meta">${meta}</span>
    </div>
  `;
  }).join('');
}

function selectComboItem(type, docId) {
  const source = comboToolsCache[type] || [];
  const t = source.find(x => x.docId === docId);
  if (!t) return;
  document.getElementById(type + '_tool_id').value = docId;
  document.getElementById(type + '_tool_search').value = t.name;
  closeCombo(type);

  if (type === 'lend') {
    const hint = document.getElementById('lend_type_hint');
    if (hint) {
      const isGood = (t.item_type || 'tool') === 'good';
      hint.style.display = 'block';
      hint.className = isGood ? 'combo-hint combo-hint-good' : 'combo-hint combo-hint-tool';
      hint.textContent = isGood
        ? '📦 صنف بضاعة/مستهلك — هيتصرف من المخزون ومش هيتسجل في "معار" ولا محتاج ترجيع'
        : '🔧 صنف أداة/عدة — هتتسجل في "معار" ولازم ترجع المخزن بعد الاستخدام';
    }
  }
}

function openCombo(type) {
  const dd = document.getElementById(type + '_tool_dropdown');
  if (dd) dd.classList.add('open');
}
function closeCombo(type) {
  const dd = document.getElementById(type + '_tool_dropdown');
  if (dd) dd.classList.remove('open');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#lend_tool_dropdown') && !e.target.closest('#lend_tool_search'))     closeCombo('lend');
  if (!e.target.closest('#return_tool_dropdown') && !e.target.closest('#return_tool_search')) closeCombo('return');
});

function lendTool() {
  const docId = document.getElementById('lend_tool_id').value;
  const worker = document.getElementById('lend_worker').value.trim();
  const qty    = parseInt(document.getElementById('lend_qty').value) || 0;
  const reason = document.getElementById('lend_reason').value.trim();

  if (!docId) return alert('اختار الصنف');
  if (!worker) return alert('اكتب اسم العامل');
  if (qty <= 0) return alert('الكمية لازم تكون أكبر من صفر');

  const t = localToolsArray.find(x => x.docId === docId);
  if (!t) return;
  if (qty > t.qty_current) return alert(`في المخزن بس ${t.qty_current} ${t.unit}`);

  const isGood = (t.item_type || 'tool') === 'good';

  if (isGood) {
    // بضاعة/مستهلك: بيتصرف نهائي من المخزون، من غير تسجيل "معار" ومن غير انتظار رجوع
    db.collection("prismops_tools").doc(docId).update({
      qty_current: t.qty_current - qty
    }).then(() => {
      addLog('صرف', t.id, t.name, qty, worker, reason, null);
      showToast(`تم صرف ${qty} ${t.unit} لـ ${worker}`);
    });
  } else {
    // أداة/عدة: بتتسجل معارة ولازم ترجع المخزن
    db.collection("prismops_tools").doc(docId).update({
      qty_current: t.qty_current - qty,
      lent_qty: (t.lent_qty || 0) + qty
    }).then(() => {
      addLog('إخراج', t.id, t.name, qty, worker, reason, null);
      showToast(`تم إخراج ${qty} ${t.unit} لـ ${worker}`);
    });
  }

  document.getElementById('lend_worker').value = '';
  document.getElementById('lend_reason').value = '';
  document.getElementById('lend_qty').value = '1';
  document.getElementById('lend_tool_search').value = '';
  document.getElementById('lend_tool_id').value = '';
  const hint = document.getElementById('lend_type_hint');
  if (hint) hint.style.display = 'none';
}

function returnTool() {
  const docId = document.getElementById('return_tool_id').value;
  const worker = document.getElementById('return_worker').value.trim();
  const qty    = parseInt(document.getElementById('return_qty').value) || 0;
  const condEl = document.querySelector('[name=return_cond]:checked');

  if (!docId)  return alert('اختار الأداة');
  if (!worker)  return alert('اكتب اسم العامل');
  if (qty <= 0) return alert('الكمية لازم تكون أكبر من صفر');
  if (!condEl)  return alert('اختار حالة الأداة');

  const t = localToolsArray.find(x => x.docId === docId);
  if (!t) return;

  const cond = condEl.value;
  const updateData = {
    lent_qty: Math.max(0, (t.lent_qty || 0) - qty)
  };
  if (cond !== 'مكسورة') {
    updateData.qty_current = t.qty_current + qty;
  }

  db.collection("prismops_tools").doc(docId).update(updateData).then(() => {
    addLog('إرجاع', t.id, t.name, qty, worker, null, cond);
    const msg = cond === 'مكسورة' ? `⚠️ ${t.name} رجعت مكسورة — تم تسجيل الخسارة` : `تم استرجاع ${qty} ${t.unit} ✓`;
    showToast(msg);
  });

  document.getElementById('return_worker').value = '';
  document.getElementById('return_qty').value = '1';
  document.getElementById('return_tool_search').value = '';
  document.getElementById('return_tool_id').value = '';
  document.querySelectorAll('[name=return_cond]').forEach(r => r.checked = false);
}

// ── Log ──────────────────────────────────────
function addLog(action, toolId, toolName, qty, worker, reason, condition) {
  db.collection("prismops_tool_log").add({
    timestamp: new Date().toISOString(),
    action, toolId, toolName, qty,
    worker: worker || null,
    reason: reason || null,
    condition: condition || null
  });
}

function renderLog() {
  let log = getLog();

  if (currentLogFilter !== 'all') {
    log = log.filter(l => l.action === currentLogFilter || (currentLogFilter === 'إضافة' && l.action === 'إضافة كمية'));
  }

  const searchEl = document.getElementById('log-search-input');
  const q = searchEl ? searchEl.value.trim().toLowerCase() : '';
  if (q) {
    log = log.filter(l =>
      (l.toolName||'').toLowerCase().includes(q) ||
      (l.worker||'').toLowerCase().includes(q) ||
      (l.reason||'').toLowerCase().includes(q) ||
      (l.action||'').toLowerCase().includes(q) ||
      (l.toolId||'').toLowerCase().includes(q)
    );
  }

  const list = document.getElementById('log-list');
  if (!list) return;

  if (!log.length) {
    const hasActiveFilters = q || currentLogFilter !== 'all';
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>${hasActiveFilters ? 'مفيش نتايج مطابقة' : 'السجل فاضي لسه'}</p></div>`;
    return;
  }
  const colorMap = { 'إخراج':'var(--amber)', 'إرجاع':'var(--success)', 'إضافة':'var(--steel)', 'إضافة كمية':'var(--steel)', 'صرف':'var(--warn)' };
  list.innerHTML = log.map(l => {
    const dt  = new Date(l.timestamp);
    const dateStr = `${dt.toLocaleDateString('ar-EG')} ${dt.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}`;
    let detail = `${l.qty} ← ${l.toolName}`;
    if (l.worker)    detail += ` · ${l.worker}`;
    if (l.reason)    detail += ` · ${l.reason}`;
    if (l.condition) detail += ` · حالة: ${l.condition}`;
    return `
      <div class="log-item">
        <div class="log-dot" style="background:${colorMap[l.action]||'var(--muted)'}"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:${colorMap[l.action]||'var(--muted)'}">${l.action}</div>
          <div class="log-text">${detail}</div>
          <div class="log-time">${dateStr}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── Edit Modal ───────────────────────────────
function openEditModal(docId) {
  const t = localToolsArray.find(x => x.docId === docId);
  if (!t) return;
  document.getElementById('edit_id').value   = docId; // سنخزن الـ docId هنا للتعديل
  document.getElementById('edit_name').value = t.name;
  const type = t.item_type || 'tool';
  const typeRadio = document.getElementById(type === 'good' ? 'eit2' : 'eit1');
  if (typeRadio) typeRadio.checked = true;
  document.getElementById('edit_qty').value  = t.qty_current;
  document.getElementById('edit_min').value  = t.qty_min || '';
  document.getElementById('edit_loc').value  = t.location || '';
  document.getElementById('edit_note').value = t.notes || '';
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }
function saveEdit() {
  const docId = document.getElementById('edit_id').value;
  const typeEl = document.querySelector('[name=edit_item_type]:checked');

  const updatedData = {
    name:         document.getElementById('edit_name').value.trim(),
    item_type:    typeEl ? typeEl.value : 'tool',
    qty_current:  parseInt(document.getElementById('edit_qty').value) || 0,
    qty_min:      parseInt(document.getElementById('edit_min').value) || 0,
    location:     document.getElementById('edit_loc').value.trim(),
    notes:        document.getElementById('edit_note').value.trim()
  };

  db.collection("prismops_tools").doc(docId).update(updatedData).then(() => {
    closeEditModal();
    showToast('تم التعديل أونلاين ✓');
  });
}

// ── Delete ───────────────────────────────────
function deleteTool(docId) {
  if (!confirm('تحذف الأداة دي نهائياً من السيرفر؟')) return;
  db.collection("prismops_tools").doc(docId).delete().then(() => {
    showToast('تم الحذف بنجاح ✓');
  });
}

// ── Export ───────────────────────────────────
function exportInventoryCSV() {
  const tools = getTools();
  if (!tools.length) return alert('المخزن فاضي');
  const cols = ['id','name','item_type','category','unit','qty_current','qty_min','lent_qty','location','notes','added_at'];
  const rows = [cols.join(','), ...tools.map(t => cols.map(c => {
    const v = t[c] ?? ''; return typeof v === 'string' && v.includes(',') ? `"${v}"` : v;
  }).join(','))];
  download('\uFEFF' + rows.join('\n'), `prismops_inventory_${today()}.csv`);
  showToast('تم التحميل ✓');
}
function exportLogCSV() {
  const log = getLog();
  if (!log.length) return alert('السجل فاضي');
  const cols = ['timestamp','action','toolId','toolName','qty','worker','reason','condition'];
  const rows = [cols.join(','), ...log.map(l => cols.map(c => {
    const v = l[c] ?? ''; return typeof v === 'string' && v.includes(',') ? `"${v}"` : v;
  }).join(','))];
  download('\uFEFF' + rows.join('\n'), `prismops_log_${today()}.csv`);
  showToast('تم التحميل ✓');
}
function download(content, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type:'text/csv;charset=utf-8'}));
  a.download = filename; a.click();
}
function today() { return new Date().toISOString().split('T')[0]; }

function clearAll() {
  if (!confirm('مسح كل البيانات نهائياً؟ الخطوة دي هتمسح داتا المصنع بالكامل من السيرفر!')) return;

  // مسح الأدوات
  db.collection("prismops_tools").get().then((snapshot) => {
    snapshot.forEach((doc) => doc.ref.delete());
  });
  // مسح السجل
  db.collection("prismops_tool_log").get().then((snapshot) => {
    snapshot.forEach((doc) => doc.ref.delete());
  });
  showToast('تم مسح السيرفر');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// الـ Listeners الفورية بتنادي على الـ render تلقائياً أول ما تفتح الصفحة
</script>
